<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lukas Gaming Center — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['"Space Grotesk"', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        obs: { bg: '#0A0A0A', card: '#111111' },
                        purple: { brand: '#6B46C1', accent: '#8B5CF6', soft: '#A78BFA' },
                        cyan: { electric: '#22D3EE' },
                    },
                    boxShadow: {
                        'glow-cyan': '0 0 0 2px rgba(34, 211, 238, 0.35), 0 0 24px rgba(34, 211, 238, 0.15)',
                        'glow-purple': '0 0 32px rgba(139, 92, 246, 0.25)',
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-6px)' } },
                    },
                },
            },
        };
    </script>
    <style>
        body { background-color: #0A0A0A; }
        .circuit-pattern {
            background-image:
                linear-gradient(rgba(34, 211, 238, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 211, 238, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(34, 211, 238, 0.06) 0%, transparent 35%);
            background-size: 48px 48px, 48px 48px, 100% 100%, 100% 100%;
        }
        .glass-card {
            background: rgba(17, 17, 17, 0.72);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.65), 0 0 0 1px rgba(139, 92, 246, 0.06);
        }
        .field-input {
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .field-input:hover {
            border-color: rgba(167, 139, 250, 0.35);
            background: rgba(17, 17, 17, 0.95);
        }
        .field-input:focus {
            outline: none;
            border-color: rgba(34, 211, 238, 0.55);
            box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.35), 0 0 24px rgba(34, 211, 238, 0.12);
        }
        .btn-signin {
            background: linear-gradient(135deg, #6B46C1 0%, #8B5CF6 45%, #22D3EE 100%);
            background-size: 200% 200%;
            transition: background-position 0.4s ease, transform 0.2s ease, box-shadow 0.3s ease;
        }
        .btn-signin:hover {
            background-position: 100% 50%;
            transform: translateY(-1px);
            box-shadow: 0 12px 40px rgba(139, 92, 246, 0.35), 0 0 24px rgba(34, 211, 238, 0.2);
        }
        .btn-signin:active { transform: translateY(0); }
        .visual-overlay {
            background: linear-gradient(90deg, rgba(10, 10, 10, 0.97) 0%, rgba(10, 10, 10, 0.75) 35%, rgba(10, 10, 10, 0.25) 65%, rgba(10, 10, 10, 0.1) 100%);
        }
        .hero-img { object-position: 75% center; }
    </style>
</head>
<body class="font-sans text-white antialiased overflow-x-hidden">
    <div class="circuit-pattern relative flex min-h-screen flex-col md:flex-row">
        <!-- Left: Form -->
        <section class="relative z-10 flex w-full flex-col items-center justify-center px-6 py-14 md:w-1/2 md:py-16 lg:px-16">
            <div class="glass-card w-full max-w-[420px] rounded-2xl p-8 sm:p-10 animate-float">
                <!-- Logo -->
                <div class="mb-8 text-center">
                    <div class="mx-auto mb-3 flex h-12 w-12 items-center justify-center rounded-xl border border-purple-accent/30 bg-purple-brand/20">
                        <i class="fa-solid fa-gamepad text-xl text-cyan-electric"></i>
                    </div>
                    <p class="font-display text-xl font-bold tracking-tight sm:text-2xl">
                        <span class="text-white">Lukas</span><span class="bg-gradient-to-r from-purple-accent to-cyan-electric bg-clip-text text-transparent"> Gaming Center</span>
                    </p>
                </div>

                <h1 class="font-display text-center text-3xl font-bold tracking-tight text-white sm:text-[2rem]">Sign In</h1>

                <form class="mt-8 space-y-4" action="#" method="post">
                    <div>
                        <input type="email" name="email" placeholder="Email" autocomplete="email" required
                               class="field-input h-12 w-full rounded-lg px-4 text-sm text-white placeholder-gray-500" />
                    </div>
                    <div>
                        <input type="password" name="password" placeholder="Password" autocomplete="current-password" required
                               class="field-input h-12 w-full rounded-lg px-4 text-sm text-white placeholder-gray-500" />
                    </div>
                    <button type="submit" class="btn-signin h-12 w-full rounded-lg font-display text-base font-semibold text-white">
                        Sign In
                    </button>
                </form>
            </div>
        </section>

        <!-- Right: Hero -->
        <section class="relative hidden min-h-[40vh] md:block md:w-1/2 md:min-h-screen">
            <img src="images/lukas-gaming-hero.png" alt="" class="hero-img absolute inset-0 h-full w-full object-cover" loading="eager" />
            <div class="visual-overlay absolute inset-0"></div>
            <div class="circuit-pattern absolute inset-0 opacity-40"></div>
        </section>
    </div>
</body>
</html>
